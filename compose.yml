services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8081:8000"
    volumes:
      - data:/app/data
    environment:
      - ADMIN_KEY=booth2026
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--ws-ping-interval", "20", "--ws-ping-timeout", "10"]

volumes:
  data:
